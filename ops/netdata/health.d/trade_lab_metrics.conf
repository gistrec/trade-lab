# Netdata health alarms on the trade-lab Prometheus metrics (go.d/prometheus
# job `trade_lab`, exported by ops/health_server.py:/metrics). These complement
# the httpcheck dead-man's-switch with VALUE-based signals.
#
# No scoping needed: each metric is its own chart with a UNIQUE context
# (prometheus.trade_lab.<metric>), so unlike the httpcheck alarms there is no
# cross-fire — the `on:` context matches exactly one chart.
#
# Install (charts already exist once /metrics is scraped, so alarms attach at
# once — no restart needed, just a health reload):
#   sudo cp ops/netdata/health.d/trade_lab_metrics.conf /etc/netdata/health.d/
#   sudo netdatacli reload-health

    template: trade_lab_open_orders
          on: prometheus.trade_lab.tradelab_open_order_incidents
       class: Errors
        type: Data Collection
   component: trade-lab
      lookup: max -1m of tradelab_open_order_incidents
       units: incidents
       every: 30s
        warn: $this > 0
       delay: down 10m multiplier 1.5 max 1h
          to: botcrit
        info: trade-lab has executed orders not in a resolved terminal state (partial / lost_track / timeout) — the "lost_track == 0" SLO is breached

    template: trade_lab_cycle_latency
          on: prometheus.trade_lab.tradelab_cycle_duration_ms_max
       class: Latency
        type: Data Collection
   component: trade-lab
      lookup: max -5m of tradelab_cycle_duration_ms_max
       units: ms
       every: 1m
        warn: $this > 60000
        crit: $this > 120000
       delay: down 15m multiplier 1.5 max 1h
          to: botcrit
        info: trade-lab max cycle duration is high (slow exchange round-trips / wait-for-ack backoff / network stall)

    template: trade_lab_journal_read_error
          on: prometheus.trade_lab.tradelab_journal_read_error
       class: Errors
        type: Data Collection
   component: trade-lab
      lookup: max -1m of tradelab_journal_read_error
       units: boolean
       every: 30s
        crit: $this > 0
       delay: down 5m multiplier 1.5 max 1h
          to: botcrit
        info: trade-lab journal is unreadable (permission / mount / corruption) — monitoring is blind
