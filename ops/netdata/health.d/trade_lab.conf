# Netdata health alarms for the trade-lab health server → botcrit (Telegram).
#
# Install:
#   sudo cp ops/netdata/health.d/trade_lab.conf /etc/netdata/health.d/trade_lab.conf
#   sudo netdatacli reload-health
#
# Modeled field-for-field on the existing `cleartranscript_healthcheck` alarm.
# `success` is httpcheck's own dimension (1 if the last probe got an accepted
# HTTP status, else 0), so `crit: $this < 1` fires on 503 / refused / timeout
# alike — the health server's 503-on-stale IS the dead-man's-switch.
#
# ┌── SCOPING — VERIFIED on this box (go.d httpcheck) ──────────────────────┐
# │ Each httpcheck job publishes a `_collect_job` chart label (confirmed via │
# │ /api/v1/charts — the cleartranscript job carries                         │
# │ `_collect_job:"cleartranscript"`). These alarms scope by `_collect_job`, │
# │ the exact job name (no URL-substring ambiguity), so each attaches to     │
# │ exactly its own chart.                                                   │
# │                                                                          │
# │ PREREQUISITE — re-scope the EXISTING CTB alarm FIRST. Your               │
# │ cleartranscript_healthcheck is `template: on: httpcheck.status` with no  │
# │ chart-labels line, so it matches EVERY httpcheck job; the moment the     │
# │ trade-lab jobs appear it will also fire on them with CTB's text. Add     │
# │ this one line to your cleartranscript_healthcheck alarm:                 │
# │     chart labels: _collect_job=cleartranscript                           │
# │ then: sudo netdatacli reload-health                                      │
# └─────────────────────────────────────────────────────────────────────────┘

    template: trade_lab_heartbeat
          on: httpcheck.status
chart labels: _collect_job=trade_lab_heartbeat
       class: Errors
        type: Data Collection
   component: trade-lab
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        crit: $this < 1
       delay: down 5m multiplier 1.5 max 1h
          to: botcrit
        info: trade-lab heartbeat down — no journal cycle within ~2h (hourly cron dead, process killed, or journal unreadable)

    template: trade_lab_daily_live
          on: httpcheck.status
chart labels: _collect_job=trade_lab_daily
       class: Errors
        type: Data Collection
   component: trade-lab
      lookup: max -1m unaligned of success
       units: ok
       every: 30s
        crit: $this < 1
       delay: down 30m multiplier 1.5 max 2h
          to: botcrit
        info: trade-lab daily LIVE order cycle unhealthy — missing >26h, or last live outcome failed/unknown_orders/partial

    template: trade_lab_dashboard
          on: httpcheck.status
chart labels: _collect_job=trade_lab_dashboard
       class: Errors
        type: Web Server
   component: trade-lab
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        # warn, NOT crit: the dashboard is read-only observability — its
        # outage is not a trading-safety event, and a routine pm2 restart
        # should not page at crit. (Streamlit >= 1.30 serves /_stcore/health;
        # yours is 1.57, so 200 is expected — verify if you ever downgrade.)
        warn: $this < 1
       delay: down 5m multiplier 1.5 max 1h
          to: botcrit
        info: trade-lab monitoring dashboard (Streamlit) not responding on :7000

# ── Silence the stock httpcheck_web_service_* alarms for trade-lab jobs ──────
# The stock templates (on: httpcheck.status, to: webmaster, in
# /usr/lib/netdata/conf.d/health.d/httpcheck.conf) fire on the same
# bad_status/no_connection/timeout our trade_lab_* alarms above already route
# to botcrit. Same-name templates scoped to `_collect_job=trade_lab_*` and
# loaded from /etc (after the stock config) override them for our three jobs
# only → one page per real failure, not two. Other httpcheck jobs (e.g.
# cleartranscript) do not match `trade_lab_*` and keep the stock webmaster
# alarm. lookup/warn/crit are mirrored from stock verbatim; only `to:` changes.

    template: httpcheck_web_service_bad_status
          on: httpcheck.status
chart labels: _collect_job=trade_lab_*
      lookup: average -5m unaligned percentage of bad_status
       every: 10s
       units: %
        warn: $this >= 10 AND $this < 40
        crit: $this >= 40
          to: silent

    template: httpcheck_web_service_no_connection
          on: httpcheck.status
chart labels: _collect_job=trade_lab_*
      lookup: average -5m unaligned percentage of no_connection
       every: 10s
       units: %
        warn: $this >= 10 AND $this < 40
        crit: $this >= 40
          to: silent

    template: httpcheck_web_service_timeouts
          on: httpcheck.status
chart labels: _collect_job=trade_lab_*
      lookup: average -5m unaligned percentage of timeout
       every: 10s
       units: %
        warn: $this >= 10 AND $this < 40
        crit: $this >= 40
          to: silent

    template: httpcheck_web_service_bad_content
          on: httpcheck.status
chart labels: _collect_job=trade_lab_*
      lookup: average -5m unaligned percentage of bad_content
       every: 10s
       units: %
        warn: $this >= 10 AND $this < 40
        crit: $this >= 40
          to: silent

    template: httpcheck_web_service_bad_header
          on: httpcheck.status
chart labels: _collect_job=trade_lab_*
      lookup: average -5m unaligned percentage of bad_header
       every: 10s
       units: %
        warn: $this >= 10 AND $this < 40
        crit: $this >= 40
          to: silent
