# Netdata health alarms for the trade-lab health server → botcrit (Telegram).
#
# Install:
#   sudo cp ops/netdata/health.d/trade_lab.conf /etc/netdata/health.d/trade_lab.conf
#   sudo netdatacli reload-health
#
# Modeled field-for-field on the existing `cleartranscript_healthcheck` alarm.
# `success` is httpcheck's own dimension (1 if the last probe got an accepted
# HTTP status, else 0), so `crit: $this < 1` fires on 503 / refused / timeout
# alike — the health server's 503-on-stale IS the dead-man's-switch.
#
# ┌── SCOPING — READ BEFORE INSTALLING (a dead-man's-switch that never fires │
# │    is worse than none) ──────────────────────────────────────────────────┤
# │ 1. FAIL-SILENT RISK: `chart labels: url=...` only works if go.d httpcheck │
# │    actually publishes a `url` chart label on YOUR version. If it does     │
# │    NOT, the pattern matches zero charts and these alarms silently never   │
# │    evaluate. VERIFY the real label key/value first:                       │
# │      curl -s http://127.0.0.1:19999/api/v1/charts | \                     │
# │        grep -A20 httpcheck   # look at each job chart's "labels"          │
# │    If there is no `url` label, scope by the concrete per-job chart id     │
# │    with a non-template `alarm:`/`on: <chart_id>` instead.                 │
# │ 2. CROSS-FIRE: `on: httpcheck.status` as a *template* matches EVERY       │
# │    httpcheck job. PREREQUISITE: first re-scope your existing              │
# │    cleartranscript_healthcheck alarm to its own job — merely adding the   │
# │    new httpcheck jobs makes an unscoped CTB template start firing on the  │
# │    trade-lab endpoints too, independent of this file.                     │
# │ (Verified against your `netdata -v`: TODO — tell Claude the version.)     │
# └─────────────────────────────────────────────────────────────────────────┘

    template: trade_lab_heartbeat
          on: httpcheck.status
chart labels: url=http://127.0.0.1:7001/healthz
       class: Errors
        type: Data Collection
   component: trade-lab
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        crit: $this < 1
       delay: down 5m multiplier 1.5 max 1h
          to: botcrit
        info: trade-lab heartbeat down — no journal cycle within ~2h (hourly cron dead, process killed, or journal unreadable)

    template: trade_lab_daily_live
          on: httpcheck.status
chart labels: url=http://127.0.0.1:7001/healthz/daily
       class: Errors
        type: Data Collection
   component: trade-lab
      lookup: max -1m unaligned of success
       units: ok
       every: 30s
        crit: $this < 1
       delay: down 30m multiplier 1.5 max 2h
          to: botcrit
        info: trade-lab daily LIVE order cycle unhealthy — missing >26h, or last live outcome failed/unknown_orders/partial

    template: trade_lab_dashboard
          on: httpcheck.status
chart labels: url=http://127.0.0.1:7000/_stcore/health
       class: Errors
        type: Web Server
   component: trade-lab
      lookup: max -1m unaligned of success
       units: ok
       every: 10s
        # warn, NOT crit: the dashboard is read-only observability — its
        # outage is not a trading-safety event, and a routine pm2 restart
        # should not page at crit. (Streamlit >= 1.30 serves /_stcore/health;
        # yours is 1.57, so 200 is expected — verify if you ever downgrade.)
        warn: $this < 1
       delay: down 5m multiplier 1.5 max 1h
          to: botcrit
        info: trade-lab monitoring dashboard (Streamlit) not responding on :7000
