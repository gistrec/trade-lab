# Netdata host-clock health -> botcrit.
#
# Clock drift is a silent-failure class for trade-lab: the idempotency
# clientOrderId is UTC-date-derived (a cross-midnight skew risks a double
# place) and signed exchange requests must be within recvWindow of the
# exchange's server time. This is the infra-side twin of the broker's
# _check_clock_skew() pre-flight guard — it catches drift CONTINUOUSLY,
# between cron runs, not just at connect.
#
# Netdata's internal `timex` plugin already charts these (system.clock_*);
# the STOCK system_clock_sync_state alarm ships as `to: silent`, so these
# route the signal to botcrit. Host-wide (helps every bot on the box).
#
# Install (charts already exist -> alarms attach at once):
#   sudo cp ops/netdata/health.d/trade_lab_clock.conf /etc/netdata/health.d/
#   sudo netdatacli reload-health

    alarm: host_clock_unsynced
       on: system.clock_sync_state
    class: Errors
     type: System
component: Clock
   lookup: min -2m of state
    units: state
    every: 30s
     crit: $this < 1
    delay: down 10m multiplier 1.5 max 1h
       to: botcrit
     info: host clock is NOT NTP-synchronized — trade-lab idempotency (UTC-derived clientOrderId) and signed-request timestamps are at risk

    alarm: host_clock_offset_high
       on: system.clock_sync_offset
    class: Latency
     type: System
component: Clock
   lookup: max -1m absolute of offset
    units: ms
    every: 30s
     warn: $this > 500
     crit: $this > 1000
    delay: down 10m multiplier 1.5 max 1h
       to: botcrit
     info: host clock offset vs NTP reference is large (>500ms warn / >1s crit) — drift that can break recvWindow or cross-midnight idempotency
